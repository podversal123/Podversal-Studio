# Podversal Studio  Render.com Blueprint
# How to use:
#   1. Push this repo to GitHub
#   2. Render Dashboard → New → Blueprint → connect your repo
#   3. Fill in all "sync: false" env vars manually in Render dashboard after first deploy
#
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: podversal-backend
    runtime: node
    rootDir: backend
    plan: starter

    # Puppeteer downloads ~170MB Chromium during npm install  starter plan required
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy
    startCommand: node dist/main
    healthCheckPath: /api/health

    envVars:
      # ── App ─────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      # ── Database (auto-linked from podversal-db below) ──────────────────────
      # Render injects the full SSL connection string automatically
      - key: DATABASE_URL
        fromDatabase:
          name: podversal-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: podversal-db
          property: connectionString

      # ── Redis (Upstash) ──────────────────────────────────────────────────────
      # Go to upstash.com → your database → copy "Redis URL" (starts with rediss://)
      - key: REDIS_URL
        sync: false

      # ── JWT (auto-generated by Render  64-char secure random strings) ───────
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # ── Google OAuth ─────────────────────────────────────────────────────────
      # Google Cloud Console → Credentials → OAuth 2.0 Client ID
      # Add https://podversal-backend.onrender.com/api/auth/google/callback to Authorized redirect URIs
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false

      # ── Email (SMTP) ─────────────────────────────────────────────────────────
      # Gmail: use App Password (not account password)  myaccount.google.com → Security → App Passwords
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

      # ── Razorpay ─────────────────────────────────────────────────────────────
      # Use LIVE keys for production (rzp_live_xxx), TEST keys for staging
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # ── Cloudinary ───────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Frontend URL ─────────────────────────────────────────────────────────
      # Set this after Vercel deployment. Example: https://podversal.vercel.app
      - key: FRONTEND_URL
        sync: false

# PostgreSQL database  Render managed
databases:
  - name: podversal-db
    plan: free
    databaseName: podversal
    user: podversal
